name: gmf_hidrometros_prod

services:
  db:
    image: postgres:16-alpine
    container_name: gmf_hidrometros_prod_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gmf_hidrometros_prod_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: gmf_hidrometros_prod_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-480}
      SESSION_IDLE_TIMEOUT_MINUTES: ${SESSION_IDLE_TIMEOUT_MINUTES:-30}
      SESSION_ACTIVITY_UPDATE_SECONDS: ${SESSION_ACTIVITY_UPDATE_SECONDS:-60}
      COOKIE_SECURE: "true"
      COOKIE_SAMESITE: strict
      FORCE_HTTPS: ${FORCE_HTTPS:-false}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      BOOTSTRAP_ADMIN_NAME: ${BOOTSTRAP_ADMIN_NAME:-Administrador}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      BACKUP_STATUS: ${BACKUP_STATUS:-Nao configurado}
      BACKUP_DIR: /app/backups
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      RESTORE_STATUS_FILE: /app/backups/restore_status.json
      FEEDBACK_UPLOAD_DIR: /app/uploads/feedback
      FEEDBACK_MAX_FILES: ${FEEDBACK_MAX_FILES:-3}
      FEEDBACK_MAX_FILE_MB: ${FEEDBACK_MAX_FILE_MB:-5}
      PG_DUMP_BIN: pg_dump
      PG_DUMP_DOCKER_CONTAINER: gmf_hidrometros_prod_db
      PG_DUMP_DOCKER_USER: ${POSTGRES_USER}
      PG_DUMP_DOCKER_DB: ${POSTGRES_DB}
      LOG_DIR: /app/logs
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      UVICORN_WORKERS: ${UVICORN_WORKERS:-2}
      READ_ONLY_MODE: ${READ_ONLY_MODE:-false}
      REDIS_URL: redis://redis:6379/0
      DB_POOL_SIZE: ${DB_POOL_SIZE:-30}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-15}
      SUSPICIOUS_OPERATION_WINDOW_SECONDS: ${SUSPICIOUS_OPERATION_WINDOW_SECONDS:-60}
      SUSPICIOUS_OPERATION_MAX_PER_WINDOW: ${SUSPICIOUS_OPERATION_MAX_PER_WINDOW:-35}
      HARD_OPERATION_MAX_PER_WINDOW: ${HARD_OPERATION_MAX_PER_WINDOW:-80}
    volumes:
      - app_logs:/app/logs
      - ./backups:/app/backups
      - ./uploads:/app/uploads
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  db-backup:
    image: postgres:16-alpine
    container_name: gmf_hidrometros_prod_backup
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./backups:/backups
    command: ["sh", "-c", "mkdir -p /backups; while true; do stamp=$$(date -u +%Y%m%d_%H%M%S); tmp=/backups/.hidrometros_auto_$${stamp}.dump.tmp; until pg_isready --host=db --port=5432 --username=$${POSTGRES_USER} --dbname=$${POSTGRES_DB}; do sleep 5; done; if pg_dump --format=custom --no-owner --no-privileges --host=db --port=5432 --username=$${POSTGRES_USER} --file=$${tmp} $${POSTGRES_DB}; then mv $${tmp} /backups/hidrometros_auto_$${stamp}.dump; find /backups -name 'hidrometros_auto_*.dump' -type f -size 0 -delete; find /backups -name 'hidrometros_auto_*.dump' -type f -mtime +$${BACKUP_RETENTION_DAYS:-7} -delete; else rm -f $${tmp}; fi; sleep $${BACKUP_INTERVAL_SECONDS:-86400}; done"]

  proxy:
    image: nginx:1.25-alpine
    container_name: gmf_hidrometros_prod_proxy
    restart: unless-stopped
    profiles: ["https"]
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ${TLS_CERT_PATH:-./certs/fullchain.pem}:/etc/nginx/certs/fullchain.pem:ro
      - ${TLS_KEY_PATH:-./certs/privkey.pem}:/etc/nginx/certs/privkey.pem:ro

volumes:
  postgres_data:
  redis_data:
  app_logs:
