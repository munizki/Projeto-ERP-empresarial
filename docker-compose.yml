name: gmf_hidrometros

services:
  db:
    image: postgres:16-alpine
    container_name: gmf_hidrometros_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hidrometros_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hidrometros_pass}
      POSTGRES_DB: ${POSTGRES_DB:-hidrometros_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hidrometros_user} -d ${POSTGRES_DB:-hidrometros_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gmf_hidrometros_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: gmf_hidrometros_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_NAME: ${APP_NAME:-Sistema de Controle de Hidrometros}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      DEBUG: ${DEBUG:-False}
      DATABASE_URL: postgresql://${POSTGRES_USER:-hidrometros_user}:${POSTGRES_PASSWORD:-hidrometros_pass}@db:5432/${POSTGRES_DB:-hidrometros_db}
      SECRET_KEY: ${SECRET_KEY:-mude-esta-chave-em-producao}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-480}
      SESSION_IDLE_TIMEOUT_MINUTES: ${SESSION_IDLE_TIMEOUT_MINUTES:-30}
      SESSION_ACTIVITY_UPDATE_SECONDS: ${SESSION_ACTIVITY_UPDATE_SECONDS:-60}
      PASSWORD_MIN_LENGTH: ${PASSWORD_MIN_LENGTH:-12}
      COOKIE_SECURE: ${COOKIE_SECURE:-False}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-strict}
      FORCE_HTTPS: ${FORCE_HTTPS:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,testserver}
      REDIS_URL: redis://redis:6379/0
      FAILED_LOGIN_WINDOW_SECONDS: ${FAILED_LOGIN_WINDOW_SECONDS:-900}
      FAILED_LOGIN_MAX_ATTEMPTS: ${FAILED_LOGIN_MAX_ATTEMPTS:-5}
      FAILED_LOGIN_LOCKOUT_SECONDS: ${FAILED_LOGIN_LOCKOUT_SECONDS:-900}
      SUSPICIOUS_OPERATION_WINDOW_SECONDS: ${SUSPICIOUS_OPERATION_WINDOW_SECONDS:-60}
      SUSPICIOUS_OPERATION_MAX_PER_WINDOW: ${SUSPICIOUS_OPERATION_MAX_PER_WINDOW:-35}
      HARD_OPERATION_MAX_PER_WINDOW: ${HARD_OPERATION_MAX_PER_WINDOW:-80}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-20}
      DB_POOL_RECYCLE_SECONDS: ${DB_POOL_RECYCLE_SECONDS:-1800}
      BOOTSTRAP_ADMIN_NAME: ${BOOTSTRAP_ADMIN_NAME:-Administrador}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      BACKUP_STATUS: ${BACKUP_STATUS:-Configurado}
      BACKUP_DIR: /app/backups
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      RESTORE_STATUS_FILE: /app/backups/restore_status.json
      PG_DUMP_BIN: pg_dump
      PG_DUMP_DOCKER_CONTAINER: gmf_hidrometros_db
      PG_DUMP_DOCKER_USER: ${POSTGRES_USER:-hidrometros_user}
      PG_DUMP_DOCKER_DB: ${POSTGRES_DB:-hidrometros_db}
      LOG_DIR: /app/logs
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_MAX_BYTES: ${LOG_MAX_BYTES:-10485760}
      LOG_BACKUP_COUNT: ${LOG_BACKUP_COUNT:-7}
      READ_ONLY_MODE: ${READ_ONLY_MODE:-False}
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  db-backup:
    image: postgres:16-alpine
    container_name: gmf_hidrometros_backup
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-hidrometros_pass}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
      POSTGRES_USER: ${POSTGRES_USER:-hidrometros_user}
      POSTGRES_DB: ${POSTGRES_DB:-hidrometros_db}
    volumes:
      - ./backups:/backups
    command: ["sh", "-c", "mkdir -p /backups; while true; do stamp=$$(date -u +%Y%m%d_%H%M%S); pg_dump --format=custom --no-owner --no-privileges --host=db --port=5432 --username=$${POSTGRES_USER} --file=/backups/hidrometros_auto_$${stamp}.dump $${POSTGRES_DB} && find /backups -name 'hidrometros_auto_*.dump' -type f -mtime +$${BACKUP_RETENTION_DAYS:-7} -delete; sleep $${BACKUP_INTERVAL_SECONDS:-86400}; done"]

volumes:
  postgres_data:
  redis_data:
