<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="csrf-cookie-name" content="{{ CSRF_COOKIE_NAME }}">
  <title>Login - GMF Saneamento</title>
  <link rel="stylesheet" href="/static/css/style.css?v={{ ASSET_VERSION }}">
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-header">
      <div class="login-logo" aria-hidden="true">
        <span>GMF</span>
      </div>
      <h1>GMF</h1>
      <p>Gestao de Medicao e Faturamento Ltda</p>
    </div>

    <div class="login-body">
      {% if erro %}
      <div class="alert alert-danger">{{ erro }}</div>
      {% endif %}
      {% if mensagem %}
      <div class="alert alert-warning">{{ mensagem }}</div>
      {% endif %}

      <form method="post" action="/auth/login">
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" placeholder="seu@email.com" required autofocus autocomplete="username">
        </div>

        <div class="form-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" name="senha" placeholder="Sua senha" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn btn-primary btn-lg" style="width:100%;margin-top:8px">
          Entrar
        </button>
      </form>
    </div>
  </div>
  <script src="/static/js/app.js?v={{ ASSET_VERSION }}"></script>
</body>
</html>
